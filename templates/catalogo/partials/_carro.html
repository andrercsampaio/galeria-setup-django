{% load static %}

<style>
    .card-carro {
        background-color: #19191c; /* Fundo do card um pouco mais claro que o body */
        border: 1px solid #29292e;
        border-radius: 10px;
        overflow: hidden; /* Garante que a imagem não saia das bordas arredondadas */
        transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        display: flex;
        flex-direction: column;
    }

    /* Efeito de brilho neon ao passar o mouse */
    .card-carro:hover {
        transform: translateY(-8px);
        border-color: #04d361; /* Borda fica verde neon */
        box-shadow: 0 10px 20px rgba(4, 211, 97, 0.2);
    }

    .card-carro .capa-container {
        width: 100%;
        height: 180px;
        background-color: #202024;
        position: relative;
    }

    .card-carro img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Ajusta a imagem sem esticá-la */
    }

    /* Badge da Categoria (GT3, PCUP) */
    .badge-categoria {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: rgba(130, 87, 229, 0.9); /* Roxo com transparência */
        color: #fff;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: bold;
        text-transform: uppercase;
    }

    .card-info {
        padding: 20px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .card-info h3 {
        margin: 0 0 10px 0;
        font-size: 1.2rem;
        color: #e1e1e6;
    }

    .btn-ver-setups {
        text-decoration: none;
        text-align: center;
        background-color: transparent;
        border: 1px solid #8257e5;
        color: #8257e5;
        padding: 10px;
        border-radius: 5px;
        font-weight: bold;
        font-size: 0.9rem;
        transition: all 0.3s ease;
    }

    .btn-ver-setups:hover {
        background-color: #8257e5;
        color: #fff;
    }
</style>

<article class="card-carro">
    <div class="capa-container">
        <span class="badge-categoria">{{ carro.categoria }}</span>

        {% if carro.foto %}
            <img src="{{ carro.foto.url }}" alt="{{ carro.nome }}">
        {% else %}
            <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #7c7c8a;">
                <span>Sem imagem</span>
            </div>
        {% endif %} </div>

    <div class="card-info">
        <h3>{{ carro.nome }}</h3>
        <a href="{% url 'detalhe_carro' carro.id %}" class="btn-ver-setups">
            VER SETUPS
        </a>
    </div>
</article>
